name: Publish NPM package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch secrets from Doppler
        id: doppler
        uses: dopplerhq/secrets-fetch-action@v1.2.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          doppler-project: 20206205tech
          doppler-config: prod

      - name: Test and Coverage
        run: npm run test -- --coverage

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ steps.doppler.outputs.CODECOV_TOKEN }}
          directory: ./coverage
          fail_ci_if_error: true

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: unit-test
    runs-on: ubuntu-latest
    permissions:
      contents: write # Quan trọng: Cho phép Semantic Release tạo Git Tag và GitHub Release
      packages: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Quan trọng: Tải toàn bộ lịch sử commit để phân tích

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Fetch secrets from Doppler
        id: doppler
        uses: dopplerhq/secrets-fetch-action@v1.2.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          doppler-project: 20206205tech
          doppler-config: prod

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Secret mặc định của GitHub Actions
          NPM_TOKEN: ${{ steps.doppler.outputs.NPM_TOKEN }} # Lấy từ Doppler
        run: npx semantic-release